name: Go

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/go.yml"

concurrency:
  group: go-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...
